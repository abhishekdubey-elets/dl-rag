# Local/prod-like stack: API + Postgres + Redis + Qdrant.
# Usage: `docker compose up --build`  (API on http://localhost:8000/docs)
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dl
      POSTGRES_PASSWORD: dl
      POSTGRES_DB: dl_rag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dl -d dl_rag"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      # Override localhost defaults with in-network service hostnames.
      POSTGRES_DSN: postgresql+asyncpg://dl:dl@postgres:5432/dl_rag
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      HOST: 0.0.0.0
      PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  qdrantdata:
